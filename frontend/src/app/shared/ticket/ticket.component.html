<article
  class="ticket"
  [class.ticket--pine]="variant === 'pine'"
  [class.ticket--rust]="variant === 'rust'"
>
  @if (eyebrow) {
    <div class="ticket__eyebrow">{{ eyebrow }}</div>
  }

  <div class="ticket__main">
    <span class="ticket__value">{{ value }}</span>
    @if (unit) {
      <span class="ticket__unit">{{ unit }}</span>
    }
  </div>

  @if (meta) {
    <div class="ticket__meta">{{ meta }}</div>
  }

  <div class="ticket__perf" aria-hidden="true"></div>

  <div class="ticket__actions">
    <ng-content></ng-content>
  </div>
</article>
